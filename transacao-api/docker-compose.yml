services:
  postgres:
    image: postgres:16-alpine
    container_name: transacao-api-postgres
    environment:
      POSTGRES_DB: transacao_api
      POSTGRES_USER: transacao_api
      POSTGRES_PASSWORD: transacao_api
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transacao_api -d transacao_api"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - transacao_api_pgdata:/var/lib/postgresql/data

  transacao-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transacao-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_STATISTICS_WINDOW_SECONDS: 60
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transacao_api
      SPRING_DATASOURCE_USERNAME: transacao_api
      SPRING_DATASOURCE_PASSWORD: transacao_api
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-only-change-me-change-me-change-me}
      APP_USER_ALLOW_TEMP_PASSWORD: "true"

volumes:
  transacao_api_pgdata:
