spring.application.name=transacao-api
server.port=8080
app.statistics.window-seconds=60
management.endpoint.health.probes.enabled=true

# Local dev convenience: auto-start docker compose (PostgreSQL) when running the app locally.
# Disable by setting SPRING_DOCKER_COMPOSE_ENABLED=false.
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:true}
spring.docker.compose.file=${SPRING_DOCKER_COMPOSE_FILE:docker-compose.dev.yml}

# --- Persistence (PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transacao_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:transacao_api}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:transacao_api}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# Expose actuator health (includes DB health when datasource is configured)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# --- Security (JWT) ---
app.jwt.issuer=${APP_JWT_ISSUER:transacao-api}
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

# Backward compatibility: allow creating a user without providing a password.
# When enabled, the API will generate a temporary password and return it once in the response.
app.user.registration.allow-temporary-password=${APP_USER_ALLOW_TEMP_PASSWORD:true}
